# chrome | firefox
browser=firefox
# Bos birakilirsa Selenium varsayilan yolu dener; sorun olursa tam yolu yazin (Windows'ta / veya \\ kullanilabilir).
firefox.binary=C:/Program Files/Mozilla Firefox/firefox.exe
base.url=https://www.zara.com/tr/
implicit.wait=10
explicit.wait=15
headless=false

# Login test e-postasi: hassas veri icin ZARA_LOGIN_EMAIL ortam degiskenini kullanin (tercih edilir).
login.email=ahmetkemalsari@gmail.com

# Bot / otomasyon algisi: user-agent, tarayici bayraklari ve insansi gecikmeler (BaseTest + HumanInteraction)
# Bos birakilirsa Chrome/Firefox icin guncel Windows UA ornekleri kullanilir.
browser.user.agent=
automation.human.behavior=true
human.pause.min.ms=80
human.pause.max.ms=350
human.typing.min.ms=35
human.typing.max.ms=120
