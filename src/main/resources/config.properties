browser=chrome
base.url=https://www.zara.com/tr/
# true: ana sayfa yuklendikten sonra cerezleri sil + yenile (onceki oturum kalintisi /login/two-step farkini azaltmak icin denenebilir; varsayilan false)
zara.clear.cookies.after.open=false
# OneTrust: tarayicida "Kabul" sonrasi Application > Cookies > OptanonConsent / OptanonAlertBoxClosed degerlerini kopyalayin.
# true: manuel/env/config ile doldurulmus cerezleri enjekte et. false iken bile onetrust.harvested.properties varsa otomatik enjekte edilir.
zara.onetrust.inject=false
zara.onetrust.cookie.domain=.zara.com
zara.onetrust.cookie.path=/
zara.onetrust.optanonconsent.value=
zara.onetrust.optanonalertboxclosed.value=
implicit.wait=10
explicit.wait=15
headless=false

# Chrome: kendi profiliniz (Chrome tamamen kapalıyken). Bos birakilirsa gecici profil kullanilir.
# Ornek Windows: C:\\Users\\KULLANICI\\AppData\\Local\\Google\\Chrome\\User Data
chrome.user.data.dir=
chrome.profile.directory=
# Bos birakilirsa Chrome'un kendi User-Agent'i kullanilir.
chrome.user.agent=Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/147.0.0.0 Safari/537.36

# Otomasyon imzasini azaltmaya yonelik secenekler (bot tespiti teşhisi icin)
chrome.disable.blink.automation.controlled=true
chrome.exclude.enable.automation.switch=true
chrome.override.navigator.webdriver=true

# Login: e-postayi karakter karakter yazma gecikmesi (ms, 0 = aninda tum metin)
human.type.delay.ms.per.char=35
# Enter'dan hemen once kisa bekleme (ms, 0 = bekleme yok)
human.pause.after.email.ms=700
